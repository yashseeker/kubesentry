name: KubeSentry CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build & Verify
        run: ./mvnw clean verify

      - name: Upload Application JAR
        uses: actions/upload-artifact@v4
        with:
          name: kubesentry-jar
          path: target/*.jar

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4

        with:
          name: jacoco-report
          path: target/site/jacoco/

#      - name: Build Docker Image
#        run: docker build -t kubesentry:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # github action exprresion syntax

      - name: Extract Docker Metadata
        id: meta # just an identifier
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME}}/kubesentry
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6 # best practices , support caching, =multi builds

        with:
          context: . #current
          push: true # docker push , false would build to locally
          tags: ${{ steps.meta.outputs.tags}}



