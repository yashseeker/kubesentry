apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: kubesentry

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

        - name: postgres

          image: postgres:16

          ports:
            - containerPort: 5432

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"

          env:

            - name: POSTGRES_DB
              value: kubesentry

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          volumeMounts:

            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
#difference pvc and volumes
      volumes:

        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc