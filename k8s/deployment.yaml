apiVersion: apps/v1

kind: Deployment

metadata:
  name: kubesentry

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kubesentry

  template:

    metadata:
      labels:
        app: kubesentry
    spec:
      containers:
        - name: kubesentry
          image: yashpandeywork/kubesentry:v2
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/kubesentry
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8080

