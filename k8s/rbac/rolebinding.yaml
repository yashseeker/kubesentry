apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: kubesentry-reader-binding
  namespace: kubesentry

subjects:
  - kind: ServiceAccount
    name: kubesentry-sa
    namespace: kubesentry

roleRef:
  kind: Role
  name: kubesentry-reader
  apiGroup: rbac.authorization.k8s.io