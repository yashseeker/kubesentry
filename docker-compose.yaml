version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: kubesentry-postgres

    environment:
      POSTGRES_DB: kubesentry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  kubesentry:

    image: kubesentry:v1

    container_name: kubesentry-app

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kubesentry
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

volumes:
  postgres_data: